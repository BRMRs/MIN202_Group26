$kind: http-request
description: "已有 PENDING 申请时再次申请，应返回错误: Application already pending"
url: "{{base_url}}/api/users/apply-contributor"
method: POST
headers:
  Authorization: Bearer {{user_token}}
scripts:
  - type: afterResponse
    code: pm.test('Should fail with 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 10000
