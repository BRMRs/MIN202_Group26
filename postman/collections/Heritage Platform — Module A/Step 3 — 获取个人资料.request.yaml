$kind: http-request
description: 获取当前登录用户的个人信息。需要在 Step 2 登录后才能使用。
url: "{{base_url}}/api/users/me"
method: GET
headers:
  Authorization: Bearer {{user_token}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Username matches', () => {
          const json = pm.response.json();
          pm.expect(json.data.username).to.eql('testuser');
          pm.expect(json.data.role).to.eql('VIEWER');
      });
    language: text/javascript
order: 5000
