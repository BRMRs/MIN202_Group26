$kind: http-request
description: 密码错误，应返回 401 Invalid credentials
url: "{{base_url}}/api/auth/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "username": "testuser",
      "password": "wrongpassword"
    }
scripts:
  - type: afterResponse
    code: pm.test('Should fail with 401', () => pm.response.to.have.status(401));
    language: text/javascript
order: 4000
