$kind: http-request
description: "bio 超过 50 字符，应返回错误: Bio must not exceed 50 characters"
url: "{{base_url}}/api/users/profile"
method: PUT
headers:
  Authorization: Bearer {{user_token}}
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "bio": "这是一段超过50个字符的bio，用来测试长度限制是否生效，应该返回错误信息"
    }
scripts:
  - type: afterResponse
    code: pm.test('Should fail with 400', () => pm.response.to.have.status(400));
    language: text/javascript
order: 8000
