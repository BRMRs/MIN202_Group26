$kind: http-request
description: 用普通用户的 token 访问管理员接口，应返回 403 Forbidden
url: "{{base_url}}/api/admin/users/applications"
method: GET
headers:
  Authorization: Bearer {{user_token}}
scripts:
  - type: afterResponse
    code: pm.test('Should fail with 403', () => pm.response.to.have.status(403));
    language: text/javascript
order: 13000
