$kind: http-request
description: 用普通用户的 token 再次查询个人资料，确认 role 已从 VIEWER 变为 CONTRIBUTOR。
url: "{{base_url}}/api/users/me"
method: GET
headers:
  Authorization: Bearer {{user_token}}
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200', () => pm.response.to.have.status(200));
      pm.test('Role is now CONTRIBUTOR', () => {
          const json = pm.response.json();
          pm.expect(json.data.role).to.eql('CONTRIBUTOR');
          console.log('Role upgraded to:', json.data.role);
      });
    language: text/javascript
order: 15000
