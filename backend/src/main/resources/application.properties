spring.datasource.url=jdbc:mysql://localhost:3306/heritage_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=Heritage@2026
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File upload directory
app.upload-dir=uploads

# Max file upload size
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=250MB

# SQL Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JWT Configuration
jwt.secret=heritage-platform-secret-key-group26-min202-must-be-at-least-256-bits
jwt.expiration=86400000

# Mail Configuration (Alibaba Cloud DirectMail / SMTP)
spring.mail.host=smtpdm.aliyun.com
spring.mail.port=465
spring.mail.username=no-reply@your-domain.com
spring.mail.password=YOUR_SMTP_PASSWORD
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# App base URL (used in email links)
app.base-url=http://YOUR_SERVER_IP:8080